<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>g/ 生態調查｜富竹賞鳥埤塘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css"></head>
<body><header><h1>富竹賞鳥埤塘資料庫</h1></header>
<nav><ul class="nav-list"><li><a href="../index.html">首頁</a></li></ul></nav>
<main>

    <!-- 植物調查 -->
    <section class="eco-section">
        <h2>植物調查</h2>
        <div class="gallery-grid">
            <article class="gallery-card">
                <img src="../images/plants/plant-01.jpg"
                     alt="植物1"
                     onclick="openModal(
                     '../images/plants/plant-01.jpg',
                     '布袋蓮',
                     '布袋蓮（學名Pontederia crassipes），又被稱為鳳眼藍、水葫蘆或浮水蓮花。
                       因其繁殖力極強、生長快速，在台灣等地被視為強勢的外來種，
                       甚至有「河川殺手」的稱號。但其發達的根系能吸收水中的重金屬與優養化物質，
                       被廣泛應用於人工濕地或廢水處理，藉由定期移除植物來帶走水中的污染物。')">
                <h3>布袋蓮</h3>
            </article>
            <article class="gallery-card">
                <img src="../images/plants/plant-02.jpg"
                     alt="植物2"
                     onclick="openModal(
                     '../images/plants/plant-02.jpg',
                     '蘆葦',
                     '蘆葦（學名：Phragmites australis），是禾本科多年生高大草本植物，
                       常生長於河流、沼澤、海岸等濕地環境。
                       生長於水邊的蘆葦有過濾泥沙、吸收水質中過多營養鹽的功能，
                       能有效淨化水質，茂密的蘆葦叢是鳥類、昆蟲等水邊動物藏身及築巢的最佳天然屏障。')">
                <h3>蘆葦</h3>
            </article>
            <article class="gallery-card">
                <img src="../images/plants/plant-03.jpg"
                     alt="植物3"
                     onclick="openModal(
                     '../images/plants/plant-03.jpg',
                     '荷花',
                     '荷花（學名：Nelumbo nucifera），又稱蓮花，是蓮科蓮屬的多年生草本挺水植物。
                      全株從花、葉、蓮子到地下的蓮藕皆具經濟與藥用價值。')">
                <h3>荷花</h3>
            </article>
        </div>
    </section>

    <!-- 鳥類調查 -->
    <section class="eco-section">
        <h2>鳥類調查</h2>
        <div class="gallery-grid">
            <article class="gallery-card">
                <img src="../images/birds/bird-01.jpg"
                     alt="鳥類1"
                     onclick="openModal(
                     '../images/birds/bird-01.jpg',
                     '小白鷺',
                     '小白鷺（學名：Egretta garzetta)，又稱白鷺，是鷺科中的一種小型鷺。
                       牠是一種白色的鳥，具有細長的黑色喙、長黑腿，以及在西部種群中有黃色的腳。
                       作為一種水鳥，牠在淺水和陸地上覓食，食用各種小型生物。
                       繁殖有群居習性，常與其他水鳥一起，在樹、灌木或蘆葦灘上用樹枝搭建巢穴。')">
                <h3>小白鷺</h3>
            </article>
            <article class="gallery-card">
                <img src="../images/birds/bird-02.jpg"
                     alt="鳥類2"
                     onclick="openModal(
                     '../images/birds/bird-02.jpg',
                     '夜鷺',
                     '夜鷺（學名：Nycticorax nycticorax）又稱黑頂夜鷺，俗稱灰窪子、夜窪子、星雁、暗光鳥仔。
                       夜鷺在台灣為常見的留鳥與繁殖鳥，由於性喜食魚，魚類養殖業者視其為害鳥。
                       在東亞全境都能看到牠們的身影，以北緯25至30度為界，以北為繁殖的夏候鳥，在以南地區為留鳥。')">
                <h3>夜鷺</h3>
            </article>
            <article class="gallery-card">
                <img src="../images/birds/bird-03.jpg"
                     alt="鳥類3"
                     onclick="openModal(
                     '../images/birds/bird-03.jpg',
                     '小鸊鷉',
                     '小鸊鷉（學名：Tachybaptus ruficollis），又作小鷿鷈，俗稱水葫蘆、王八鴨子、油葫蘆、油鴨、水避仔。
                       會潛水的小型鳥，相當普遍但不太起眼，棲息於周邊有蘆葦或其他植被的溼地。
                       很少乖乖待在同一個地點讓你看；極少離開開闊水面(主要都待水裡)。
                       體型相當小巧，頭圓但後腦杓有點蓬。通常單隻或成鬆散的小群，白天常見到在睡覺。
                       繁殖羽往往看起來整隻暗色，光線好時注意暗鏽紅色的頭頸側以及嘴基部的黃色斑。
                       非繁殖羽整體呈現髒髒的淺褐色調，頭頂暗色。')">
                <h3>小鸊鷉</h3>
            </article>
        </div>
    </section>
    <!-- Modal 放大視窗 -->
    <div id="imageModal"
         class="modal">
        <span class="close"
              onclick="closeModal()">
              &times;
        </span>
        <div class="modal-content">
            <img id="modalImage"
                 src=""
                 alt="">
            <h3 id="modalTitle"></h3>
            <p id="modalDescription"></p>
        </div>
    </div>

<!-- Modal JavaScript -->
<script>
function openModal(img, title, description){
    document.getElementById(
        "imageModal"
    ).style.display = "flex";
    document.getElementById(
        "modalImage"
    ).src = img;
    document.getElementById(
        "modalTitle"
    ).innerText = title;
    document.getElementById(
        "modalDescription"
    ).innerText = description;
}
function closeModal(){
    document.getElementById(
        "imageModal"
    ).style.display = "none";
}
</script>
  
</main>
