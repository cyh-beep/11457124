  <h2>互動任務</h2>
  <!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富竹賞鳥埤塘生態與功能學習單</title>
</head>
<body>

<div class="container">
    <h1>富竹賞鳥埤塘生態與功能學習單</h1>

    <div class="question-block">
        <div class="question-title">選擇題 1. 富竹賞鳥埤塘最初的主要功能是什麼？</div>
        <div class="options">
            <label><input type="radio" name="q1" value="A"> A. 賞鳥觀光</label>
            <label><input type="radio" name="q1" value="B"> B. 農業灌溉</label>
            <label><input type="radio" name="q1" value="C"> C. 停車場</label>
            <label><input type="radio" name="q1" value="D"> D. 運動公園</label>
        </div>
        <button class="btn-check" onclick="checkRadio('q1', 'B', 'ans1')">確認</button>
        <div id="ans1" class="feedback"></div>
    </div>

    <div class="question-block">
        <div class="question-title">選擇題 2. 富竹賞鳥埤塘吸引許多人前來的主要原因是什麼？</div>
        <div class="options">
            <label><input type="radio" name="q2" value="A"> A. 遊樂設施</label>
            <label><input type="radio" name="q2" value="B"> B. 百貨公司</label>
            <label><input type="radio" name="q2" value="C"> C. 豐富的鳥類生態</label>
            <label><input type="radio" name="q2" value="D"> D. 夜市</label>
        </div>
        <button class="btn-check" onclick="checkRadio('q2', 'C', 'ans2')">確認</button>
        <div id="ans2" class="feedback"></div>
    </div>

    <div class="question-block">
        <div class="question-title">填充題 1. 富竹賞鳥埤塘又稱為 ______ 埤塘。</div>
        <input type="text" id="q3" class="input-fill" placeholder="請輸入答案（）">
        <button class="btn-check" onclick="checkText('q3', ['2-18號'], 'ans3')">確認</button>
        <div id="ans3" class="feedback"></div>
    </div>

    <div class="question-block">
        <div class="question-title">填充題 2. 富竹賞鳥埤塘除了灌溉功能外，也具有 ______ 與生態教育功能。</div>
        <input type="text" id="q4" class="input-fill" placeholder="請輸入答案">
        <button class="btn-check" onclick="checkText('q4', ['賞鳥', '觀光休閒', '觀光', '休閒', '休閒觀光', '觀鳥'], 'ans4')">確認</button>
        <div id="ans4" class="feedback"></div>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
</main>
