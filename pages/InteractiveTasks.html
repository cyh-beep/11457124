<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>互動任務｜富竹賞鳥埤塘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css"></head>
<body><header><h1>富竹賞鳥埤塘</h1></header>
<nav><ul class="nav-list"><li><a href="../index.html">首頁</a></li></ul></nav>
<main>
  <h2>互動任務</h2>
  <!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富竹賞鳥埤塘生態與功能學習單</title>
    <style>
        /* --- 基礎樣式 --- */
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c5e43;
            margin-bottom: 30px;
        }
        .question-block {
            background-color: #fafafa;
            border-left: 5px solid #4caf50;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
        }
        .question-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        
        /* --- 選擇題與填充題輸入樣式 --- */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .options label {
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .options label:hover {
            background-color: #eaeaea;
        }
        .input-fill {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* --- 檢查按鈕樣式 --- */
        .btn-check {
            background-color: #2c5e43;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.3s;
        }
        .btn-check:hover {
            background-color: #1e422e;
        }

        /* --- 回饋訊息樣式 --- */
        .feedback {
            margin-top: 12px;
            font-weight: bold;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .correct {
            color: #2e7d32;
        }
        .wrong {
            color: #c62828;
        }

        /* --- 導覽按鈕區塊 --- */
        .nav-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-nav {
            flex: 1;
            min-width: 150px;
            text-align: center;
            text-decoration: none;
            background-color: #4a7c59;
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-nav:hover {
            background-color: #355a40;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>富竹賞鳥埤塘生態與功能學習單</h1>

    <div class="question-block">
        <div class="question-title">選擇題 1. 富竹賞鳥埤塘最初的主要功能是什麼？</div>
        <div class="options">
            <label><input type="radio" name="q1" value="A"> A. 賞鳥觀光</label>
            <label><input type="radio" name="q1" value="B"> B. 農業灌溉</label>
            <label><input type="radio" name="q1" value="C"> C. 停車場</label>
            <label><input type="radio" name="q1" value="D"> D. 運動公園</label>
        </div>
        <button class="btn-check" onclick="checkRadio('q1', 'B', 'ans1')">確認</button>
        <div id="ans1" class="feedback"></div>
    </div>

    <div class="question-block">
        <div class="question-title">選擇題 2. 富竹賞鳥埤塘吸引許多人前來的主要原因是什麼？</div>
        <div class="options">
            <label><input type="radio" name="q2" value="A"> A. 遊樂設施</label>
            <label><input type="radio" name="q2" value="B"> B. 百貨公司</label>
            <label><input type="radio" name="q2" value="C"> C. 豐富的鳥類生態</label>
            <label><input type="radio" name="q2" value="D"> D. 夜市</label>
        </div>
        <button class="btn-check" onclick="checkRadio('q2', 'C', 'ans2')">確認</button>
        <div id="ans2" class="feedback"></div>
    </div>

    <div class="question-block">
        <div class="question-title">填充題 1. 富竹賞鳥埤塘又稱為 ______ 埤塘。</div>
        <input type="text" id="q3" class="input-fill" placeholder="請輸入答案（）">
        <button class="btn-check" onclick="checkText('q3', ['2-18號'], 'ans3')">確認</button>
        <div id="ans3" class="feedback"></div>
    </div>

    <div class="question-block">
        <div class="question-title">填充題 2. 富竹賞鳥埤塘除了灌溉功能外，也具有 ______ 與生態教育功能。</div>
        <input type="text" id="q4" class="input-fill" placeholder="請輸入答案">
        <button class="btn-check" onclick="checkText('q4', ['賞鳥', '觀光休閒', '觀光', '休閒', '休閒觀光', '觀鳥'], 'ans4')">確認</button>
        <div id="ans4" class="feedback"></div>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
</main>
<footer>© 2026 富竹賞鳥埤塘資料庫</footer>
<script src="../js/script.js"></script></body></html>
