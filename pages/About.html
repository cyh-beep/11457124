        <h2>富竹賞鳥埤塘（2-18號埤塘）</h2>
        <p>
            富竹賞鳥埤塘，又稱為2-18號埤塘，位於桃園市蘆竹區富竹里，
            鄰近富竹街與地方活動中心，周邊以農地、水圳及道路系統為主。
            因其生態豐富且候鳥駐足的自然地景而廣為人知，因此吸引大量賞鳥人士前往聚集觀察。
        </p>
        <p>
            鄉公所也於2021年規劃了專門的窺視牆配合賞鳥活動，
            全長共二十七公里，牆上設有高低不同的牆眼；
            一旁亦設置彩色賞鳥圖鑑，讓民眾能更加瞭解此處的鳥類生態。
        </p>
